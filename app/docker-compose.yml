version: '3.8'

services:
  # -------------------------------
  # NGINX - The receptionist
  # Receives visitors on port 80
  # and forwards them to the Node app
  # -------------------------------
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

  # -------------------------------
  # NODE.JS APP - The e-commerce store
  # Runs the website and API
  # -------------------------------
  app:
    build: .
    container_name: node-app
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/ecommerce
    depends_on:
      - mongo
    restart: unless-stopped

  # -------------------------------
  # MONGODB - The database
  # Stores products, orders, etc.
  # -------------------------------
  mongo:
    image: mongo:6-jammy
    container_name: mongodb
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
